name: Deploy documentation

env:
  ESLINT_MODE: full

on:
  push:
    branches: ['main']

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest

    # Make devenv the default shell for all run steps in this job
    defaults:
      run:
        shell: devenv shell bash -- -e {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix & devenv
        uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        shell: bash
        run: nix profile add nixpkgs#devenv

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Generate icons
        run: dev init

      - name: Build documentation website
        run: dev build.docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
